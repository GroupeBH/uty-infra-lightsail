name: Deploy Uty API to Lightsail

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      app_image_tag:
        description: "Docker image tag to deploy. Empty uses repository variable APP_IMAGE_TAG, then latest."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: uty-api-lightsail-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Terraform and Ansible deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-central-1' }}
      ADMIN_CIDR: ${{ vars.ADMIN_CIDR }}
      KEY_PAIR_NAME: ${{ vars.KEY_PAIR_NAME }}
      LIGHTSAIL_BUNDLE_ID: ${{ vars.LIGHTSAIL_BUNDLE_ID || 'micro_3_1' }}
      LIGHTSAIL_BLUEPRINT_ID: ${{ vars.LIGHTSAIL_BLUEPRINT_ID || 'ubuntu_24_04' }}
      INSTANCE_NAME: ${{ vars.INSTANCE_NAME || 'uty-api-prod' }}
      STATIC_IP_NAME: ${{ vars.STATIC_IP_NAME || 'uty-api-prod-ip' }}
      SSH_USER: ${{ vars.SSH_USER || 'ubuntu' }}
      DOMAIN_NAME: ${{ vars.DOMAIN_NAME || 'api.uty-app.com' }}
      CADDY_EMAIL: ${{ vars.CADDY_EMAIL }}
      HEALTHCHECK_PATH: ${{ vars.HEALTHCHECK_PATH || '/health' }}
      APP_IMAGE_REPOSITORY: ${{ vars.APP_IMAGE_REPOSITORY || 'gbhsarl/uty-api' }}
      APP_IMAGE_TAG_OVERRIDE: ${{ vars.APP_IMAGE_TAG || 'latest' }}
      APP_IMAGE_TAG_INPUT: ${{ github.event.inputs.app_image_tag }}
      TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET || 'uty-lightsail-tfstate' }}
      TF_BACKEND_KEY: ${{ vars.TF_BACKEND_KEY || 'uty-api-lightsail/terraform.tfstate' }}
      TF_BACKEND_REGION: ${{ vars.TF_BACKEND_REGION || vars.AWS_REGION || 'eu-central-1' }}
      SSH_PRIVATE_KEY_PATH: ${{ runner.temp }}/ssh/lightsail_deploy_key
      APP_ENV_FILE: .env.production
      TERRAFORM_INIT_RECONFIGURE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Ansible
        run: |
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user "ansible-core>=2.16,<2.19"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare CI secrets and Terraform backend
        env:
          LIGHTSAIL_SSH_PRIVATE_KEY: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}
          APP_ENV_PRODUCTION: ${{ secrets.APP_ENV_PRODUCTION }}
          TERRAFORM_TFVARS: ${{ secrets.TERRAFORM_TFVARS }}
        run: |
          set -euo pipefail

          : "${TF_BACKEND_BUCKET:?Set repository variable TF_BACKEND_BUCKET for remote Terraform state.}"
          : "${LIGHTSAIL_SSH_PRIVATE_KEY:?Set secret LIGHTSAIL_SSH_PRIVATE_KEY.}"
          : "${APP_ENV_PRODUCTION:?Set secret APP_ENV_PRODUCTION.}"

          mkdir -p "$(dirname "$SSH_PRIVATE_KEY_PATH")"
          chmod 700 "$(dirname "$SSH_PRIVATE_KEY_PATH")"
          install -m 600 /dev/null "$SSH_PRIVATE_KEY_PATH"
          printf '%s\n' "$LIGHTSAIL_SSH_PRIVATE_KEY" > "$SSH_PRIVATE_KEY_PATH"

          install -m 600 /dev/null "$APP_ENV_FILE"
          printf '%s\n' "$APP_ENV_PRODUCTION" > "$APP_ENV_FILE"

          if [[ -n "${TERRAFORM_TFVARS:-}" ]]; then
            install -m 600 /dev/null terraform/terraform.tfvars
            printf '%s\n' "$TERRAFORM_TFVARS" > terraform/terraform.tfvars
          fi

          {
            printf 'bucket  = "%s"\n' "$TF_BACKEND_BUCKET"
            printf 'key     = "%s"\n' "$TF_BACKEND_KEY"
            printf 'region  = "%s"\n' "$TF_BACKEND_REGION"
            printf 'encrypt = true\n'
          } > terraform/backend.hcl
          chmod 600 terraform/backend.hcl

      - name: Resolve image tag and SSH CIDRs
        run: |
          set -euo pipefail

          if [[ -n "$APP_IMAGE_TAG_INPUT" ]]; then
            resolved_tag="$APP_IMAGE_TAG_INPUT"
          elif [[ -n "$APP_IMAGE_TAG_OVERRIDE" ]]; then
            resolved_tag="$APP_IMAGE_TAG_OVERRIDE"
          else
            resolved_tag="$GITHUB_SHA"
          fi

          echo "APP_IMAGE_TAG=$resolved_tag" >> "$GITHUB_ENV"

          runner_ip="$(curl -fsSL https://checkip.amazonaws.com | tr -d '[:space:]')"
          runner_cidr="${runner_ip}/32"

          echo "TF_VAR_extra_ssh_cidrs=[\"$runner_cidr\"]" >> "$GITHUB_ENV"

          if [[ -z "$ADMIN_CIDR" ]]; then
            echo "ADMIN_CIDR=$runner_cidr" >> "$GITHUB_ENV"
          fi

      - name: Validate Terraform and Ansible
        run: |
          set -euo pipefail
          terraform -chdir=terraform init -backend=false
          terraform -chdir=terraform fmt -check
          terraform -chdir=terraform validate
          ansible-playbook -i ansible/inventory.ini.example --syntax-check ansible/playbook.yml

      - name: Deploy to Lightsail
        run: ./deploy.sh
